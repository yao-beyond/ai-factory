name: Release

# Build and publish the gateway container image to GHCR on a version tag.
#   git tag v0.1.0 && git push origin v0.1.0
# Produces:
#   ghcr.io/<owner>/ai-factory-gateway:0.1.0
#   ghcr.io/<owner>/ai-factory-gateway:latest   (stable line only)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build & push gateway image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          # linux/amd64 only for v0.1.0 — the Dockerfile pins an amd64 kubectl
          # binary. Add linux/arm64 once that is parameterised (post-v0.1.0).
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/ai-factory-gateway:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ai-factory-gateway:latest
