name: Release

# Build and publish the gateway container image to GHCR on a version tag.
#   git tag v0.1.0 && git push origin v0.1.0
# Produces (multi-arch: linux/amd64 + linux/arm64):
#   ghcr.io/<owner>/ai-factory-gateway:<version>
#   ghcr.io/<owner>/ai-factory-gateway:latest   (STABLE tags only — a prerelease
#                                                 tag like v0.2.0-rc1 does NOT move
#                                                 :latest)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build & push gateway image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive tags
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          repo="ghcr.io/${{ github.repository_owner }}/ai-factory-gateway"
          tags="${repo}:${version}"
          # Only advance :latest for a stable release. A semver prerelease tag
          # (anything with a "-suffix", e.g. v0.2.0-rc1) ships its version tag but
          # must not become :latest, so `docker compose up` users stay on stable.
          case "$version" in
            *-*) echo "Prerelease ${version}: not updating :latest" ;;
            *)   tags="${tags}"$'\n'"${repo}:latest" ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          { echo "tags<<EOF"; printf '%s\n' "$tags"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
