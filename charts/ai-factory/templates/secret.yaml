{{- if and (not .Values.existingSecret) .Values.secretEnv }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-factory.fullname" . }}-secrets
  labels:
    {{- include "ai-factory.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secretEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
