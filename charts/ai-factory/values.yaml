image:
  repository: your-registry/ai-factory-gateway
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

# Externally reachable URL used to build links (e.g. Telegram buttons).
publicBaseUrl: ""

# The contents of ai-factory.yml, rendered into a ConfigMap and mounted so the
# gateway binds it via AiFactoryProperties. Keep secrets OUT of here.
aiFactoryConfig: |
  version: 1
  workspace:
    workDir: /opt/ai-jobs
    mode: local
  git:
    provider: github
    repo: https://github.com/your-org/your-repo.git
    targetBranch: main
    branchPrefix: ai
  agents:
    maxAgents: 3
  security:
    allowRepositories:
      - https://github.com/your-org/*
    protectedBranches:
      - main
      - master
      - "release/*"
    requireHumanMerge: true
    draftPullRequests: true
    pullRequestLabel: ai-generated
  secrets:
    provider: env

# Reference an existing Secret (recommended) instead of putting tokens in values.
# It should contain keys like GITHUB_TOKEN / OPENAI_API_KEY / ANTHROPIC_API_KEY.
existingSecret: ""

# Only used when existingSecret is empty. These create a Secret from values
# (avoid committing real values; prefer existingSecret).
secretEnv: {}
  # GITHUB_TOKEN: ""
  # OPENAI_API_KEY: ""
  # ANTHROPIC_API_KEY: ""

workDir:
  # emptyDir by default; set persistence.enabled for a PVC.
  persistence:
    enabled: false
    size: 1Gi

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

ingress:
  enabled: false
  host: ""
