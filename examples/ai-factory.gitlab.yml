# Example: AI Factory targeting a GitLab repository.
# Tokens stay in the environment — see .env.example.
version: 1

workspace:
  workDir: ./.work
  mode: local

git:
  provider: gitlab
  repo: https://gitlab.com/acme/app.git
  targetBranch: main
  branchPrefix: ai

agents:
  maxAgents: 3
  planner: codex
  developer: claude
  reviewer: codex

security:
  allowRepositories:
    - https://gitlab.com/acme/*
  protectedBranches:
    - main
    - "release/*"
  requireHumanMerge: true
  draftPullRequests: true
  pullRequestLabel: ai-generated

secrets:
  provider: env
